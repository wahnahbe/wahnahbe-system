<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAHNAHBE SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#08050F}
a{color:#3FE8FF}a:hover{color:#D24BFF}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(22,12,40,.4)}
::-webkit-scrollbar-thumb{background:rgba(210,75,255,.35)}
input,select,button,textarea{font-family:'Share Tech Mono',monospace}
select option{background:#140B26;color:#F2EAFF}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:rgba(210,75,255,.25);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:14px;background:#3FE8FF;cursor:pointer;border:1px solid #D24BFF}
@keyframes notifIn{0%{opacity:0;transform:translate(-50%,-8px) skewX(0deg)}30%{opacity:1;transform:translate(-49.7%,0) skewX(2deg)}45%{transform:translate(-50.3%,0) skewX(-2deg)}60%{transform:translate(-50%,0) skewX(0)}100%{opacity:1;transform:translate(-50%,0)}}
@keyframes ascendIn{0%{opacity:0}40%{opacity:1}55%{opacity:.7}70%{opacity:1}100%{opacity:1}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 14px rgba(210,75,255,.25)}50%{box-shadow:0 0 26px rgba(210,75,255,.5)}}
@keyframes bootBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes bootOut{0%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(6px);visibility:hidden}}
@keyframes dashIn{0%{opacity:.2;transform:translateY(10px) scale(.995)}100%{opacity:1;transform:none}}
@keyframes glitchTxt{0%,100%{text-shadow:0 0 8px rgba(210,75,255,.6)}25%{text-shadow:-2px 0 rgba(63,232,255,.8),2px 0 rgba(255,255,255,.6)}50%{text-shadow:2px 0 rgba(63,232,255,.8),-2px 0 rgba(210,75,255,.6)}}
[data-rm="1"] *{animation:none !important;transition:none !important}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
